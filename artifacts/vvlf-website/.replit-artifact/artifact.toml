kind = "web"
previewPath = "/"
title = "Vishnu Venture Labs Foundation"
version = "1.0.0"
id = "artifacts/vvlf-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19464

[services.development]
run = "pnpm --filter @workspace/vvlf-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vvlf-website", "run", "build" ]
publicDir = "artifacts/vvlf-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19464"
BASE_PATH = "/"
